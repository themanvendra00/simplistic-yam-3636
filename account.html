<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glam Bridal | Account</title>
  <script src="https://kit.fontawesome.com/f584623432.js" crossorigin="anonymous"></script>
  <link rel="icon" type="image/png" sizes="16x16" href="./images/favicon.png">

  <!-- external css -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">

  <!-- custom css -->
  <link rel="stylesheet" href="./styles/nav.css" />
  <link rel="stylesheet" href="./styles/footer.css" />
  <link rel="stylesheet" href="./styles/account.css" />

  <!-- font-awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css"
    integrity="sha512-5A8nwdMOWrSz20fDsjczgUidUBR8liPYU+WymTZP1lmY9G6Oc7HlZv156XqnsgNUzTyMefFTcsFH/tnJE/+xBg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <div id="navbar"></div>
  <div id="container">
    <div id="top-sec">
      <h1 id="name-display"></h1>
      <div id="logout">
        <i class="fa fa-user-o" aria-hidden="true"></i>
        <p>Log out</p>
      </div>
    </div>

    <div id="profile-section" class="mt-4 mb-5">
      <div class="card">
        <div class="card-body">
          <h2 class="card-title mb-3">Your Profile</h2>
          <form id="profile-form">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="first_name" class="form-label">First name</label>
                <input type="text" id="first_name" class="form-control" />
              </div>
              <div class="col-md-6">
                <label for="last_name" class="form-label">Last name</label>
                <input type="text" id="last_name" class="form-control" />
              </div>
              <div class="col-12">
                <label for="profile-email" class="form-label">Email</label>
                <input type="email" id="profile-email" class="form-control" />
              </div>
              <div class="col-12">
                <label for="profile-password" class="form-label">New password (optional)</label>
                <input type="password" id="profile-password" class="form-control" placeholder="Leave blank to keep current password" />
              </div>
            </div>

            <div class="d-flex gap-3 mt-3 flex-wrap">
              <button type="submit" id="update-profile-btn" class="btn btn-primary">
                Update Profile
              </button>
              <button type="button" id="delete-account-btn" class="btn btn-outline-danger">
                Delete Account
              </button>
            </div>
          </form>
          <p id="profile-status" class="mt-3 mb-0"></p>
        </div>
      </div>
    </div>

    <div id="below-table">
      <hr class="hr-bar" />
      <div id="products-list"></div>
      <hr class="hr-bar" />
      <div id="sub-total-price"></div>
    </div>
  </div>
  <div id="footer"></div>
</body>
<script src="./scripts/account.js" type="module"></script>

</html>
